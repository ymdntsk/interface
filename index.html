<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jogo Rpg</title>
</head>

<body>
    <div class="Background">
        <div class="Nome">
            <h1>Arthur</h1>
            <h2 class="Nivel">Nível 5</h2>
        </div>
        <div><hr class="h1"></div>
        
        <div class="Estado">
            
            <h2>Estado: Em batalha</h2>
            <h2>25/50</h2>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="Buttons">
            
            <input type="button" value="⚔️Receber Dano" class="b1">
            <input type="button" value="🧪Curar" class="b2">
            <input type="button" value="⭐Subir de Nível" class="b2">
        </div>

        <div class="Text">
            <p class="o1">A sua aventura começou</p>
            <div>
            <hr class="h2">
            </div>
            <p class="o2">Recebeu 25 de Dano</p>
            <div>
            <hr class="h2">
            </div>
            <p class="o3">Usou uma Poção de vida</p>
            
        </div>
    </div>



</body>

</html>
